name: docker mixnet integration tests
on: [pull_request]
jobs:

  test_e2e_client2:
    permissions:
      contents: read
      packages: write
    env:
      warped: true
      no_mixdecoy: true
      no_decoy: true
      epoch_duration: 2m
      no_metrics: true
    strategy:
      matrix:
        go-version: [1.26.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CA certificates
        if: ${{ env.ACT }}
        run: |
          # CA certs are mounted from host, just ensure they're linked properly
          if [ -d /etc/ssl/certs ] && [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            echo "CA certificates already available"
          else
            apt update && apt install -y ca-certificates build-essential gcc g++ make
            update-ca-certificates podman
          fi
        continue-on-error: true

      - name: Configure podman socket
        run: |
          systemctl --user start podman.socket || true

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and start the mixnet
        run: |
          cd docker && make start wait

      - name: Sleep for a few seconds to allow the mixnet to fully start
        run: sleep 5

      - name: run old client core end to end tests
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest-legacy && cat coverage.part >> ../coverage.out

      - name: run new Pigeonhole API Alice sends Bob test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_new_pigeonhole_alice_sends_bob && cat coverage.part >> ../coverage.out

      - name: run new Pigeonhole API multiple messages test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_new_pigeonhole_multiple_messages && cat coverage.part >> ../coverage.out

      - name: run new Pigeonhole API multiple messages bulk test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_new_pigeonhole_multiple_messages_bulk && cat coverage.part >> ../coverage.out

      - name: run pigeonhole copy command test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_copy_command && cat coverage.part >> ../coverage.out

      - name: run pigeonhole multi-channel copy command test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_multichannel && cat coverage.part >> ../coverage.out

      - name: run pigeonhole efficient multi-channel copy command test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_multichannel_efficient && cat coverage.part >> ../coverage.out

      - name: run pigeonhole tombstone box test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_tombstone_box && cat coverage.part >> ../coverage.out

      - name: run pigeonhole tombstone range test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_tombstone_range && cat coverage.part >> ../coverage.out

      - name: run pigeonhole box ID not found error test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_box_id_not_found && cat coverage.part >> ../coverage.out

      - name: run pigeonhole box already exists error test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_box_already_exists && cat coverage.part >> ../coverage.out

      - name: run pigeonhole read before write test
        run: cd client2 && make testargs=-coverprofile=coverage.part dockertest_read_before_write && cat coverage.part >> ../coverage.out

      - name: Dump kpclientd logs on failure
        if: failure()
        run: |
          cd docker && docker compose -f voting_mixnet/docker-compose.yml logs --tail 200 kpclientd

      - name: Stop the mixnet
        run: |
          cd docker && make stop

      - name: Upload testnet state
        uses: actions/upload-artifact@v4
        if: always() && !env.ACT
        with:
          name: mixnet-${{ github.run_id }}-${{ github.job }}
          path: |
            docker/voting_mixnet/*/*.log
