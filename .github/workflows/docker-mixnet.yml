name: docker mixnet integration tests
on: [pull_request]
jobs:

  test_e2e_client2:
    permissions:
      contents: read
      packages: write
    env:
      warped: true
      no_mixdecoy: true
      no_decoy: true
      epoch_duration: 2m
      no_metrics: true
    strategy:
      matrix:
        go-version: [1.26.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CA certificates
        if: ${{ env.ACT }}
        run: |
          # CA certs are mounted from host, just ensure they're linked properly
          if [ -d /etc/ssl/certs ] && [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            echo "CA certificates already available"
          else
            apt update && apt install -y ca-certificates build-essential gcc g++ make
            update-ca-certificates podman
          fi
        continue-on-error: true

      - name: Configure podman socket
        run: |
          systemctl --user start podman.socket || true

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and start the mixnet
        run: |
          cd docker && make start wait

      - name: Sleep for a few seconds to allow the mixnet to fully start
        run: sleep 5

      - name: run legacy client end to end tests
        run: cd client2 && make dockertest-legacy

      - name: run all pigeonhole integration tests
        run: cd client2 && make dockertest_all_pigeonhole

      - name: Dump kpclientd logs on failure
        if: failure()
        run: |
          cd docker && make client-logs-snapshot

      - name: Dump replica logs on failure
        if: failure()
        run: |
          cd docker && tail -50 voting_mixnet/replica*/katzenpost.log

      - name: Stop the mixnet
        run: |
          cd docker && make stop

      - name: Upload testnet state
        uses: actions/upload-artifact@v4
        if: always() && !env.ACT
        with:
          name: mixnet-${{ github.run_id }}-${{ github.job }}
          path: |
            docker/voting_mixnet/*/*.log
