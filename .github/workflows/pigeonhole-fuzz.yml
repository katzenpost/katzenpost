name: pigeonhole fuzz

on:
  pull_request:
  schedule:
    # Run a longer fuzz pass weekly. Sunday 04:00 UTC.
    - cron: '0 4 * * 0'

jobs:
  fuzz:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        arch: [amd64]
        go-version: ["1.26.x"]
        target:
          - FuzzParseCourierEnvelope
          - FuzzParseCourierEnvelopeReply
          - FuzzParseCourierQuery
          - FuzzParseCourierQueryReply
          - FuzzParseReplicaRead
          - FuzzParseReplicaReadReply
          - FuzzParseReplicaInnerMessage
          - FuzzParseReplicaWrite
          - FuzzParseReplicaMessageReplyInnerMessage
          - FuzzParseReplicaWriteReply
          - FuzzParseBox
          - FuzzParseCopyCommand
          - FuzzParseCopyCommandReply
          - FuzzParseCopyStreamElement
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      # PRs get a quick 30s smoke fuzz per target so a regression that
      # introduces a panic or unbounded allocation surfaces on every change
      # at a cost of ~7 minutes wall time across the matrix. The weekly
      # cron job above gives each target five minutes for a deeper sweep.
      - name: Determine fuzz duration
        id: fuzz-duration
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "duration=5m" >> "$GITHUB_OUTPUT"
          else
            echo "duration=30s" >> "$GITHUB_OUTPUT"
          fi

      - name: Run fuzz target ${{ matrix.target }}
        run: |
          cd pigeonhole && go test \
            -run='^$' \
            -fuzz='^${{ matrix.target }}$' \
            -fuzztime='${{ steps.fuzz-duration.outputs.duration }}'

      - name: Upload fuzz corpus on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pigeonhole-fuzz-corpus-${{ matrix.target }}
          path: pigeonhole/testdata/fuzz/${{ matrix.target }}
          if-no-files-found: ignore
