\* TLC configuration: two concurrent ARQ operations, up to two rotations each.
\* Message flavours (read / idempotent write / non-idempotent write) are chosen
\* nondeterministically per message in Init, so all combinations are explored.
\* Reply loss, connection loss, retransmission, and cancel/ack interleavings
\* are all exercised.

CONSTANTS
  Msgs = {m1, m2}
  MaxRetx = 2

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT AtMostOnce
INVARIANT CompletedReportedOnce
INVARIANT CancelIsFinal
INVARIANT RetxBounded
INVARIANT NoPendingWhenTerminal
INVARIANT DoneImpliesReported
