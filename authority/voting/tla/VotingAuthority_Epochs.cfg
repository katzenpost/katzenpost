\* TLC configuration: multi-epoch, honest-majority case.
\*
\* Runs two consecutive epochs with no Byzantine authorities. Exercises the
\* epoch boundary and SRV chaining. Nodes is empty to focus on the shared-random
\* chain (the descriptor tally is not the point here) and keep the state space
\* small across epochs.
\*
\* Expected: all safety invariants hold, including ChainConsistency -- honest
\* authorities never disagree on the prior-epoch SRV they chain onto.
\*
\* Run:
\*   tlc -config VotingAuthority_Epochs.cfg VotingAuthority.tla

CONSTANTS
    Auths     = {a1, a2, a3}
    Byzantine = {}
    Nodes     = {}
    MaxEpoch  = 2

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT Agreement
INVARIANT Validity
INVARIANT Integrity
INVARIANT ChainConsistency
INVARIANT ChainGrounded
