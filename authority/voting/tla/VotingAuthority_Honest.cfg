\* TLC configuration: honest-majority / crash-fault case, single epoch.
\* No Byzantine authorities. All safety invariants should hold.
\*
\* Run:
\*   tlc -config VotingAuthority_Honest.cfg VotingAuthority.tla

CONSTANTS
    Auths     = {a1, a2, a3}
    Byzantine = {}
    Nodes     = {n1}
    MaxEpoch  = 1

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT Agreement
INVARIANT Validity
INVARIANT Integrity
INVARIANT ChainGrounded
