\* TLC configuration: one Byzantine authority among three.
\*
\* TLC is expected to report an Agreement counterexample: lossy delivery can
\* leave the two honest authorities with different views (hence different
\* documents), and a single double-signing Byzantine authority can then supply
\* the deciding second signature for BOTH documents, so the two honest
\* authorities finalise different documents.
\*
\* This is the expected, well-known result: a simple majority quorum (2f+1)
\* tolerates crash/omission faults but NOT a Byzantine fault; Byzantine
\* agreement requires 3f+1.
\*
\* Run:
\*   tlc -config VotingAuthority_Byzantine.cfg VotingAuthority.tla

CONSTANTS
    Auths     = {a1, a2, a3}
    Byzantine = {a3}
    Nodes     = {n1}
    MaxEpoch  = 1

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT Agreement
INVARIANT Validity
INVARIANT Integrity
