\* TLC configuration: multi-epoch, one Byzantine authority.
\*
\* Runs two consecutive epochs with one Byzantine authority among three.
\*
\* Expected: TLC reports a ChainConsistency counterexample. A Byzantine
\* Agreement violation in the first epoch lets two different documents each
\* gather Threshold signatures, so honest authorities adopt different SRVs and
\* the shared-random chain forks permanently from that epoch onward.
\*
\* Run:
\*   tlc -config VotingAuthority_EpochsByzantine.cfg VotingAuthority.tla

CONSTANTS
    Auths     = {a1, a2, a3}
    Byzantine = {a3}
    Nodes     = {}
    MaxEpoch  = 2

INIT Init
NEXT Next

INVARIANT TypeOK
INVARIANT ChainConsistency
