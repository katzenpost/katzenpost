\* TLC configuration: a healthy mix node processing a small packet set.
\* Two packet instances over a single tag allow replay scenarios to arise;
\* a 4-tick horizon with one-tick epochs exercises key rotation and pruning.

CONSTANTS
  Packets = {p1, p2}
  Tags = {t1}
  MaxTick = 3
  EpochLen = 1
  NumMixKeys = 2
  UnwrapDelay = 2
  SchedulerSlack = 1

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT ReplayFreedom
INVARIANT ForwardSecrecy
INVARIANT NoEarlyDispatch
INVARIANT MixingDelayBounded
INVARIANT ForwardedValid
INVARIANT DeliveredLocal
INVARIANT DropAccounted
